openapi: 3.0.3
info:
  title: Auth Service API
  description: Secure authentication service with Fastify and MongoDB
  version: 1.0.0
servers:
  - url: http://localhost:4000
    description: Local development server
paths:
  /api/v1/users/register:
    post:
      summary: Register a new user
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUser"
      responses:
        "201":
          description: Created
        "409":
          description: User already exists
  /api/v1/users/login:
    post:
      summary: User login
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginUser"
      responses:
        "200":
          description: Success
        "401":
          description: Unauthorized
components:
  schemas:
    CreateUser:
      type: object
      required: [name, email, password]
      properties:
        name: { type: string }
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
    LoginUser:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }
