name: JavaScript Tests

on:
  push:
    paths:
      - 'javascript/**'
      - '.github/workflows/js-tests.yml'
      - '.github/test-paths/js-test-projects.txt'
  pull_request:
    paths:
      - 'javascript/**'
      - '.github/workflows/js-tests.yml'
      - '.github/test-paths/js-test-projects.txt'

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      projects: ${{ steps.detect.outputs.projects }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read test projects and detect changes
        id: detect
        run: |
          BASE_REF=""
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BASE_REF="${{ github.event.pull_request.base.sha }}"
          else
            BASE_REF="${{ github.event.before }}"
          fi

          PROJECTS="[]"
          TEST_PROJECTS=()

          while IFS= read -r project; do
            if [ -n "$project" ] && [[ ! "$project" =~ ^# ]]; then
              TEST_PROJECTS+=("$project")
            fi
          done < .github/test-paths/js-test-projects.txt

          CHANGED_PROJECTS=()
          for project in "${TEST_PROJECTS[@]}"; do
            if [ -n "$BASE_REF" ] && [ "$BASE_REF" != "0000000000000000000000000000000000000000" ]; then
              if git diff --name-only $BASE_REF HEAD -- "$project" 2>/dev/null | grep -q .; then
                CHANGED_PROJECTS+=("$project")
              fi
            else
              if git ls-tree -r --name-only HEAD -- "$project" 2>/dev/null | grep -q .; then
                CHANGED_PROJECTS+=("$project")
              fi
            fi
          done

          if [ ${#CHANGED_PROJECTS[@]} -gt 0 ]; then
            PROJECTS=$(printf '%s\n' "${CHANGED_PROJECTS[@]}" | jq -R -s -c 'split("\n")[:-1]')
          fi

          echo "projects=$PROJECTS" >> $GITHUB_OUTPUT

  test:
    needs: detect-changes
    if: needs.detect-changes.outputs.projects != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: ${{ fromJson(needs.detect-changes.outputs.projects) }}
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Check for package.json
        id: check-package
        run: |
          PROJECT_PATH="javascript/${{ matrix.project }}"
          if [ -f "$PROJECT_PATH/package.json" ]; then
            echo "has-package=true" >> $GITHUB_OUTPUT
          else
            echo "has-package=false" >> $GITHUB_OUTPUT
          fi

      - name: Check for test script
        if: steps.check-package.outputs.has-package == 'true'
        id: check-test
        run: |
          PROJECT_PATH="javascript/${{ matrix.project }}"
          if grep -q '"test"' "$PROJECT_PATH/package.json"; then
            echo "has-test=true" >> $GITHUB_OUTPUT
          else
            echo "has-test=false" >> $GITHUB_OUTPUT
          fi

      - name: Detect package manager
        if: steps.check-test.outputs.has-test == 'true'
        id: detect-pm
        run: |
          PROJECT_PATH="javascript/${{ matrix.project }}"

          if [ -f "$PROJECT_PATH/bun.lockb" ]; then
            echo "package-manager=bun" >> $GITHUB_OUTPUT
          elif [ -f "$PROJECT_PATH/pnpm-lock.yaml" ]; then
            echo "package-manager=pnpm" >> $GITHUB_OUTPUT
          elif [ -f "$PROJECT_PATH/yarn.lock" ]; then
            echo "package-manager=yarn" >> $GITHUB_OUTPUT
          else
            echo "package-manager=npm" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.check-test.outputs.has-test == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup pnpm
        if: steps.check-test.outputs.has-test == 'true' && steps.detect-pm.outputs.package-manager == 'pnpm'
        uses: pnpm/action-setup@v2
        with:
          version: latest

      - name: Setup Bun
        if: steps.check-test.outputs.has-test == 'true' && steps.detect-pm.outputs.package-manager == 'bun'
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies (npm)
        if: steps.check-test.outputs.has-test == 'true' && steps.detect-pm.outputs.package-manager == 'npm'
        run: |
          cd javascript/${{ matrix.project }}
          npm ci

      - name: Install dependencies (pnpm)
        if: steps.check-test.outputs.has-test == 'true' && steps.detect-pm.outputs.package-manager == 'pnpm'
        run: |
          cd javascript/${{ matrix.project }}
          pnpm install

      - name: Install dependencies (Bun)
        if: steps.check-test.outputs.has-test == 'true' && steps.detect-pm.outputs.package-manager == 'bun'
        run: |
          cd javascript/${{ matrix.project }}
          bun install

      - name: Install dependencies (Yarn)
        if: steps.check-test.outputs.has-test == 'true' && steps.detect-pm.outputs.package-manager == 'yarn'
        run: |
          cd javascript/${{ matrix.project }}
          yarn install

      - name: Run tests
        if: steps.check-test.outputs.has-test == 'true'
        run: |
          cd javascript/${{ matrix.project }}
          if [ "${{ steps.detect-pm.outputs.package-manager }}" == "npm" ]; then
            npm test
          elif [ "${{ steps.detect-pm.outputs.package-manager }}" == "pnpm" ]; then
            pnpm test
          elif [ "${{ steps.detect-pm.outputs.package-manager }}" == "bun" ]; then
            bun test
          elif [ "${{ steps.detect-pm.outputs.package-manager }}" == "yarn" ]; then
            yarn test
          fi

      - name: Create GitHub Issue on test failure
        if: failure() && steps.check-test.outputs.has-test == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const issueTitle = `[JavaScript] Test failure in javascript/${{ matrix.project }}`;
            const issueBody = "## JavaScript Test Failure\n\n" +
              "**Project:** `javascript/${{ matrix.project }}`\n" +
              "**Package Manager:** `${{ steps.detect-pm.outputs.package-manager || 'unknown' }}`\n" +
              "**Triggered by:** ${{ github.event.head_commit.message || github.event.pull_request.title || 'push' }}\n" +
              "**Commit:** [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})\n\n" +
              "### Test Output\n" +
              "Please check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for detailed test output.\n\n" +
              "---\n" +
              "*This issue was automatically created by GitHub Actions*";

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['js-test-failure', 'javascript/${{ matrix.project }}']
            });

            const existingIssue = issues.data.find(issue => issue.title === issueTitle);

            if (existingIssue) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: issueBody
              });
              core.info(`Updated issue #${existingIssue.number}`);
            } else {
              const newIssue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: issueTitle,
                body: issueBody,
                labels: ['js-test-failure', `javascript/${{ matrix.project }}`]
              });
              core.info(`Created issue #${newIssue.data.number}`);
            }

      - name: Close GitHub Issue on test success
        if: success() && steps.check-test.outputs.has-test == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const issueTitle = `[JavaScript] Test failure in javascript/${{ matrix.project }}`;

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['js-test-failure', 'javascript/${{ matrix.project }}']
            });

            for (const issue of issues.data) {
              if (issue.title === issueTitle) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed'
                });
                core.info(`Closed issue #${issue.number}`);
              }
            }

      - name: Report test success
        if: success() && steps.check-test.outputs.has-test == 'true'
        run: |
          echo "✅ All tests passed for: javascript/${{ matrix.project }}"

  summary:
    needs: [detect-changes, test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Print test summary
        run: |
          echo "📊 JavaScript Test Summary"
          echo "=========================="
          PROJECTS='${{ needs.detect-changes.outputs.projects }}'
          if [ "$PROJECTS" != "[]" ]; then
            echo "✅ All tests passed for the following projects:"
            echo "$PROJECTS" | jq -r '.[]' | while read project; do
              echo "  ✓ javascript/$project"
            done
          else
            echo "ℹ️ No JavaScript projects changed"
          fi
